{% extends "base.html" %}
{% load i18n static %}

{% block title %}Register Restaurant — Lynctel Food{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/pages/food.css' %}">
{% endblock %}

{% block content %}
<div class="container-md px-3 py-5">
  <div class="card p-4">
    <h1 class="h5 mb-3 font-display">Register your restaurant</h1>
    <form method="post" action="{% url 'food:register' %}" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Restaurant name</label>
        <input name="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">City</label>
        <input name="city" class="form-control" required>
      </div>
      <div class="mb-3 row g-2">
        <div class="col-md-6">
          <label class="form-label">Banner (optional)</label>
          <input type="file" name="banner" class="form-control form-control-sm">
        </div>
        <div class="col-md-6">
          <label class="form-label">Logo (optional)</label>
          <input type="file" name="logo" class="form-control form-control-sm">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Minimum order (GHS)</label>
        <input name="min_order" type="number" min="0" class="form-control" value="0">
      </div>
      <button class="btn btn-navy">Register</button>
    </form>
  </div>
</div>
{% endblock %}
