{% extends "base.html" %}
{% load i18n static %}

{% block title %}{% if item %}Edit item{% else %}Add menu item{% endif %} — Lynctel{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/pages/food.css' %}">
{% endblock %}

{% block content %}
<div class="container-md px-3 py-4">
  <div class="card p-4">
    <h1 class="h5 mb-3 font-display">{% if item %}Edit{% else %}Add{% endif %} menu item</h1>
    <form method="post" action="{% if item %}{% url 'food:item_edit' item.pk %}{% else %}{% url 'food:item_add' %}{% endif %}" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input name="name" class="form-control" value="{{ item.name|default:'' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3">{{ item.description|default:'' }}</textarea>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-md-4">
          <label class="form-label">Price (GHS)</label>
          <input name="price" type="number" step="0.01" class="form-control" value="{{ item.price|default:'' }}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Prep time (min)</label>
          <input name="prep_time" class="form-control" value="{{ item.prep_time|default:'' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Image</label>
          <input type="file" name="image" class="form-control form-control-sm">
        </div>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="is_spicy" id="is_spicy" {% if item.is_spicy %}checked{% endif %}>
        <label class="form-check-label" for="is_spicy">Spicy</label>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="is_vegan" id="is_vegan" {% if item.is_vegan %}checked{% endif %}>
        <label class="form-check-label" for="is_vegan">Vegan</label>
      </div>
      <button class="btn btn-navy">{% if item %}Save changes{% else %}Add item{% endif %}</button>
    </form>
  </div>
</div>
{% endblock %}
