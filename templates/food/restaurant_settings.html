{% extends "base.html" %}
{% load i18n static %}

{% block title %}Restaurant Settings — {{ vendor.name }}{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/pages/food.css' %}">
{% endblock %}

{% block content %}
<div class="container-md px-3 py-4">
  <div class="card p-4">
    <h1 class="h5 mb-3 font-display">Restaurant settings</h1>
    <form method="post" action="{% url 'food:restaurant_settings' %}" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Restaurant name</label>
        <input name="name" class="form-control" value="{{ vendor.name }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Opening hours</label>
        <input name="opening_hours" class="form-control" value="{{ vendor.opening_hours }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Status</label>
        <select name="status" class="form-select">
          <option value="open" {% if vendor.status=='open' %}selected{% endif %}>Open</option>
          <option value="busy" {% if vendor.status=='busy' %}selected{% endif %}>Busy</option>
          <option value="closed" {% if vendor.status=='closed' %}selected{% endif %}>Closed</option>
        </select>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-navy">Save</button>
        <a href="{% url 'food:restaurant_dashboard' %}" class="btn btn-outline-secondary">Back</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
