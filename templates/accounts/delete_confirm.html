{% extends "base.html" %}
{% block title %}Delete Account — Lynctel{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-20 text-center">
  <div class="w-16 h-16 bg-red-100 rounded-2xl flex items-center justify-center
              text-3xl mx-auto mb-5">⚠️</div>
  <h1 class="font-display font-700 text-2xl text-navy mb-2">Delete Account?</h1>
  <p class="text-gray-500 text-sm mb-8 leading-relaxed">
    This will permanently delete your account, order history, and all personal data.
    This action <strong>cannot be undone</strong>.
  </p>
  <form method="POST" class="space-y-3">
    {% csrf_token %}
    <button type="submit"
            class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold
                   py-3 rounded-xl transition-colors">
      Yes, Delete My Account
    </button>
    <a href="{% url 'accounts:profile' %}"
       class="block w-full border border-gray-200 hover:border-navy text-navy
              font-semibold py-3 rounded-xl transition-colors text-sm">
      Cancel — Keep My Account
    </a>
  </form>
</div>
{% endblock %}
