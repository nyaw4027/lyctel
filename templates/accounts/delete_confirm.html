{% extends "base.html" %}
{% block title %}Delete Account — Lynctel{% endblock %}
{% block content %}
<div class="mx-auto px-3 py-5 text-center" style="max-width: 28rem;">
  <div class="bg-danger bg-opacity-10 rounded-3 d-flex align-items-center justify-content-center fs-2 mx-auto mb-4" style="width:4rem;height:4rem;">⚠️</div>
  <h1 class="font-display fw-bold fs-2 text-navy mb-2">Delete Account?</h1>
  <p class="text-secondary small mb-4" style="line-height:1.6;">
    This will permanently delete your account, order history, and all personal data.
    This action <strong>cannot be undone</strong>.
  </p>
  <form method="POST" class="d-flex flex-column gap-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger w-100 fw-semibold py-3 rounded-xl">
      Yes, Delete My Account
    </button>
    <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary w-100 fw-semibold py-3 rounded-xl small text-navy">
      Cancel — Keep My Account
    </a>
  </form>
</div>
{% endblock %}
